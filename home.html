<script>


  const firebaseConfig = {
  apiKey: "AIzaSyCC83UEiQx1uASpDhm-_ortsvcBBbre8J4",
  authDomain: "lbcs-1b1b6.firebaseapp.com",
  databaseURL: "https://lbcs-1b1b6-default-rtdb.firebaseio.com",
  projectId: "lbcs-1b1b6",
  storageBucket: "lbcs-1b1b6.firebasestorage.app",
  messagingSenderId: "898216398934",
  appId: "1:898216398934:web:0f7adbd99271dd4bacabf7",
  measurementId: "G-2ED8CXQDMD"
};



// מאתחל את ה-Firebase עם ההגדרות שנתנו
const app = firebase.initializeApp(firebaseConfig);
// יוצר משתנה 'db' שדרכו נבצע את כל פעולות הקריאה והכתיבה


// --- חלק 3: פונקציות עזר ולוגיקה ---

// פונקציה שיוצרת "הפסקה" של זמן (במילי-שניות) כדי שנוכל לחכות בין פעולות המנוע
const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));
let catWasInside = false;   // זיכרון אם היה חתול
let isCleaning = false;   // נעילה – מונע שתי פעולות במקביל
// מאזין ללחיצה על כפתור הניקוי ב-HTML (הפונקציה מוגדרת כ-async כדי שנוכל להשתמש ב-await להמתנה)
document.getElementById('cleanBtn').addEventListener('click', async () => {
if (isCleaning) return;   // אם כבר מנקה – לא עושה כלום
isCleaning = true;        // מפעיל נעילה
   
  try {
        console.log("בודק נתונים מהחיישנים...");

        const snapshot = await firebase.database().ref('/fromAltera').get();
        const data = snapshot.val();

        if (data && data.A === 0 && data.B === 255) {

            await firebase.database().ref('toAltera').set(1);
            await delay(1000);  // השהייה של שנייה
            await firebase.database().ref('toAltera').set(0);

            alert("הניקוי הסתיים בהצלחה!");

        } else {
            alert("זהירות! זוהה חתול במכשיר או שאין חיבור לחיישנים.");
        }

    } catch (e) {
        console.error("שגיאה בביצוע הפקודות:", e);
        alert("אירעה שגיאה בחיבור לשרת.");
    } finally{
       isCleaning = false;   // משחרר נעילה בסיום
    }
   

});



async function autoCheckSensors() {
  if (isCleaning) return;

    try {
        const snapshot = await firebase.database().ref('/fromAltera').get();
        const data = snapshot.val();

        if (!data) return;

        // מצב 1: יש חתול בפנים
        if (data.A !== 0 && data.B !== 255) {
            console.log("חתול בפנים");
            catWasInside = true;
        }

        // מצב 2: אין חתול כרגע, אבל קודם היה
        if (catWasInside && data.A === 0 && data.B === 255) {
            
            console.log("החתול יצא - שולח 129");

            // מחכה 2 שניות לוודא יציאה אמיתית
            await delay(2000);

            const checkAgain = await firebase.database().ref('/fromAltera').get();
            const newData = checkAgain.val();

            if (newData && newData.A === 0 && newData.B === 255) {
                await firebase.database().ref('toAltera').set(129);
                await delay(1000);  // השהייה של שנייה
                await firebase.database().ref('toAltera').set(128);
                catWasInside = false;  // מאפס זיכרון
            }
        }

    } catch (error) {
        console.error("שגיאה בבדיקת החיישנים:", error);
    }
    
}

// בדיקה כל שנייה
setInterval(autoCheckSensors, 1000);


  </script>
